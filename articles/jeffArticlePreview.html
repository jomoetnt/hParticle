<div class="jeffArticleListItem">
    <a href="{link}" class="jeffArticleLink">
        <div class="jeffSmallArticlePreview">
            <div class="jeffTopicSmall" style="color: var(--{colour}-topic-color);">{topic}</div>
            <h3 class="jeffArticleHeadingSmall">{title}</h3>
            <div class="jeffTeaser">
                {teaser}
            </div>
            <div class="jeffDateSmall">{date}</div>
        </div>
        <img alt="Photograph of Eugene Wigner" src="{thumbnail}" class="jeffArticleImageSmall">
    </a>
</div>
